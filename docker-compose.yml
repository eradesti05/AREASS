services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-areass}
    volumes:
      - mongo_data:/data/db
    networks:
      - net

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-secret}@mongodb:27017/${MONGO_DB:-areass}?authSource=admin
      ML_API_URL: http://ml:8000
      JWT_SECRET: ${JWT_SECRET:-changeme}
    depends_on:
      - mongodb
    networks:
      - net

  ml:
    build: ./ML
    restart: unless-stopped
    networks:
      - net

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - net

volumes:
  mongo_data:

networks:
  net:
    driver: bridge